<script>
/* ══════════════════════════════════════════
   MEME WEB AUDIO ENGINE
══════════════════════════════════════════ */
let actx=null, muted=false, bgNode=null;

function getAC(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  return actx;
}
function toggleMute(){
  muted=!muted;
  let b=document.getElementById('mute-btn');
  b.textContent=muted?'🔇':'🔊';
  b.classList.toggle('muted',muted);
}

/* ── Raw oscillator ── */
function osc(freq,type,dur,vol,startFreq){
  if(muted)return;
  let c=getAC(),o=c.createOscillator(),g=c.createGain();
  o.type=type;
  o.frequency.setValueAtTime(startFreq||freq,c.currentTime);
  if(startFreq) o.frequency.exponentialRampToValueAtTime(freq,c.currentTime+dur*0.5);
  g.gain.setValueAtTime(vol,c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
  o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+dur);
}

/* ── Noise ── */
function noise(dur,vol,lp=600){
  if(muted)return;
  let c=getAC(),buf=c.createBuffer(1,c.sampleRate*dur,c.sampleRate);
  let d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  let src=c.createBufferSource(),f=c.createBiquadFilter(),g=c.createGain();
  f.type='lowpass';f.frequency.value=lp;
  g.gain.setValueAtTime(vol,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
  src.buffer=buf;src.connect(f);f.connect(g);g.connect(c.destination);src.start();src.stop(c.currentTime+dur);
}

/* ── Vibrato / wobble ── */
function wobble(freq,dur,vol){
  if(muted)return;
  let c=getAC(),o=c.createOscillator(),lfo=c.createOscillator(),lfog=c.createGain(),g=c.createGain();
  o.type='sawtooth';o.frequency.value=freq;
  lfo.frequency.value=8;lfog.gain.value=30;
  lfo.connect(lfog);lfog.connect(o.frequency);
  g.gain.setValueAtTime(vol,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
  o.connect(g);g.connect(c.destination);lfo.start();o.start();lfo.stop(c.currentTime+dur);o.stop(c.currentTime+dur);
}

/* ════════════════════════
   MEME SOUND LIBRARY 😂
════════════════════════ */
const SFX={
  // 🐸 "boing" jump — rubber duck energy
  jump(){
    osc(200,'sine',0.06,0.3,80);
    setTimeout(()=>osc(400,'sine',0.06,0.2,200),50);
    setTimeout(()=>osc(600,'square',0.08,0.1,400),100);
    noise(0.04,0.06,200);
  },

  // 💨 thud land
  land(){
    noise(0.08,0.35,250);
    osc(80,'sawtooth',0.1,0.25);
  },

  // 🐔 duck = chicken cluck sound
  duck(){
    osc(800,'square',0.04,0.15);
    setTimeout(()=>osc(600,'square',0.04,0.12),40);
    setTimeout(()=>osc(400,'square',0.05,0.1),80);
    setTimeout(()=>noise(0.05,0.1,400),60);
  },

  // 😬 "oof" hit — classic meme pain sound
  hit(){
    // trombone fail
    osc(400,'sawtooth',0.05,0.3);
    setTimeout(()=>osc(350,'sawtooth',0.05,0.28),50);
    setTimeout(()=>osc(280,'sawtooth',0.08,0.25),100);
    setTimeout(()=>osc(200,'sawtooth',0.15,0.22),180);
    setTimeout(()=>{
      noise(0.2,0.3,500);
      osc(80,'sawtooth',0.25,0.2);
    },250);
  },

  // ✅ safe pass — little coin blip
  pass(){
    osc(880,'square',0.04,0.07);
    setTimeout(()=>osc(1100,'square',0.04,0.05),40);
  },

  // 🎺 Q shield — DOOT DOOT
  skillQ(){
    let notes=[392,392,784];
    notes.forEach((f,i)=>setTimeout(()=>osc(f,'square',0.15,0.18),i*120));
    setTimeout(()=>osc(988,'square',0.3,0.15),400);
  },

  // 🐌 W slow — "waaaaaah" descending trombone
  skillW(){
    osc(600,'sawtooth',0.6,0.2,900);
    setTimeout(()=>wobble(150,0.4,0.12),300);
  },

  // 👻 E phase — spooky "woooOOOO"
  skillE(){
    wobble(300,0.5,0.15);
    setTimeout(()=>wobble(600,0.3,0.1),200);
    let c=getAC(),o=c.createOscillator(),g=c.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(200,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(1200,c.currentTime+0.3);
    o.frequency.exponentialRampToValueAtTime(100,c.currentTime+0.6);
    g.gain.setValueAtTime(0.18,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.6);
    o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.6);
  },

  // 💥 R nuke — "EXPLOSION + airhorn"
  skillR(){
    // explosion
    noise(0.6,0.55,180);
    osc(55,'sawtooth',0.7,0.4);
    // airhorn after
    setTimeout(()=>{
      [440,440,440].forEach((_,i)=>{
        setTimeout(()=>{
          osc(440,'sawtooth',0.15,0.3);
          osc(554,'sawtooth',0.15,0.2);
        },i*180);
      });
    },300);
  },

  // 🎶 wave up — Nintendo-ish level up
  wave(){
    [262,330,392,523,659].forEach((f,i)=>setTimeout(()=>osc(f,'square',0.1,0.14),i*80));
  },

  // ☠️ wave danger — horror sting
  waveDanger(){
    wobble(80,0.5,0.25);
    setTimeout(()=>noise(0.3,0.2,300),200);
    setTimeout(()=>osc(60,'sawtooth',0.5,0.3),400);
  },

  // 🪙 score ping — subtle
  scoreUp(){
    osc(1047,'sine',0.04,0.05);
  },

  // 🎮 game over — SAD TROMBONE
  gameOver(){
    let melody=[
      {f:587,d:300},{f:554,d:300},{f:494,d:300},
      {f:440,d:200},{f:415,d:200},{f:370,d:500},
    ];
    let t=0;
    melody.forEach(n=>{
      setTimeout(()=>osc(n.f,'sawtooth',n.d/1000+0.05,0.22),t);
      t+=n.d;
    });
    setTimeout(()=>noise(0.5,0.25,400),t);
  },

  // 🎉 start — fanfare
  start(){
    [262,330,392,523,659,784,1047].forEach((f,i)=>setTimeout(()=>osc(f,'square',0.12,0.14),i*70));
  },

  // 🔔 skill ready ping
  ready(){
    osc(1318,'sine',0.12,0.1);
    setTimeout(()=>osc(1568,'sine',0.1,0.08),100);
  }
};

/* ── CHIPTUNE BGM ── */
let bgInterval=null, bgBass=null;
function startBGM(){
  if(muted) return;
  let c=getAC();
  // bass drone
  bgBass=c.createOscillator();
  let bg=c.createGain();bgBass.type='square';bgBass.frequency.value=55;bg.gain.value=0.03;
  bgBass.connect(bg);bg.connect(c.destination);bgBass.start();

  const scale=[262,294,330,392,440,523,587,659];
  let step=0;
  function tick(interval){
    bgInterval=setInterval(()=>{
      if(muted)return;
      let f=scale[step%scale.length]*(step%16<8?1:2);
      let o=c.createOscillator(),g=c.createGain();
      o.type='square';o.frequency.value=f;
      g.gain.setValueAtTime(0.055,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.09);
      o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.09);
      step++;
    },interval);
  }
  window._bgTick=tick;
  tick(145);
}
function stopBGM(){
  if(bgInterval){clearInterval(bgInterval);bgInterval=null;}
  try{bgBass&&bgBass.stop();}catch(e){}bgBass=null;
}
function setBGMTempo(w){
  if(bgInterval){clearInterval(bgInterval);bgInterval=null;}
  if(window._bgTick) window._bgTick(Math.max(75,145-w*9));
}

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
const W=Math.min(window.innerWidth,580);
const H=Math.min(window.innerHeight-30,390);
const GY=H-68;
document.getElementById('wrap').style.width=W+'px';
document.getElementById('wrap').style.height=H+'px';

/* ══════════════════════════════════════════
   GLOBAL STATE — reset fully on restart
══════════════════════════════════════════ */
let score=0,best=0,lives=3,wave=1;
let gameStarted=false;
let sceneRef=null;

const EL=id=>document.getElementById(id);
const p6=n=>String(Math.floor(n)).padStart(6,'0');
function hud(){
  EL('hs').textContent=p6(score);EL('hb').textContent=p6(best);
  EL('hw').textContent=String(wave).padStart(2,'0');
  const h=['💀','❤️','❤️❤️','❤️❤️❤️'];
  EL('hl2').textContent=h[Math.max(0,Math.min(3,lives))];
}

/* ── Reset skill UI without recreating DOM ── */
function resetSkillDOM(){
  ['q','w','e','r'].forEach(id=>{
    EL('sk-'+id).className='skill ready';
    EL('cd-'+id).style.height='0%';
    EL('cdt-'+id).textContent='';
  });
}

function startGame(){
  let ss=EL('start-screen');
  if(ss) ss.remove();
  gameStarted=true;
  SFX.start();
  startBGM();
  if(sceneRef) sceneRef._beginPlay();
}

/* Skill state — defined at module level, reset in scene create */
const SK={
  q:{id:'q',cd:8000, dur:3000,active:false,cdLeft:0,t0:0,wasReady:true},
  w:{id:'w',cd:12000,dur:5000,active:false,cdLeft:0,t0:0,wasReady:true},
  e:{id:'e',cd:9000, dur:2000,active:false,cdLeft:0,t0:0,wasReady:true},
  r:{id:'r',cd:22000,dur:1500,active:false,cdLeft:0,t0:0,wasReady:true},
};
function skRdy(id){return SK[id].cdLeft<=0&&!SK[id].active;}
function skUI(id,now){
  let sk=SK[id],el=EL('sk-'+id),cd=EL('cd-'+id),ct=EL('cdt-'+id);
  let isRdy=skRdy(id);
  if(isRdy&&!sk.wasReady) SFX.ready();
  sk.wasReady=isRdy;
  if(sk.active){el.className='skill active';cd.style.height=sk.dur>0?Math.max(0,(1-(now-sk.t0)/sk.dur)*100)+'%':'0%';ct.textContent='';}
  else if(sk.cdLeft>0){el.className='skill oncd';cd.style.height=Math.max(0,sk.cdLeft/sk.cd*100)+'%';ct.textContent=Math.ceil(sk.cdLeft/1000)+'s';}
  else{el.className='skill ready';cd.style.height='0%';ct.textContent='';}
}

/* Obstacle types */
const OT={
  TALL:{labels:['FIX BUG','DEPLOY NOW','OVERDUE!!!','PROD DOWN'],colors:[0xff2244,0xff2244,0xff00ff,0xff3300],getY:th=>GY-th/2+2,heights:[50,60,68,54],widths:[34,38,42,36],hint:'JUMP',hintCol:'#ff4466'},
  LOW:{labels:['MEETING','REPORT Q1','SPRINT DEMO','STANDUP'],colors:[0x44ff88,0xff7700,0xffe135,0x00ccff],getY:th=>GY-48-th/2,heights:[16,18,16,18],widths:[80,88,76,82],hint:'DUCK',hintCol:'#44ff88'},
  FLOAT:{labels:['CODE REVIEW','BUG REPORT','SCOPE CREEP','TECH DEBT'],colors:[0x00aaff,0xaa44ff,0xff6644,0x44ddff],getY:th=>GY-78-th/2,heights:[28,24,32,26],widths:[60,56,66,58],hint:'JUMP',hintCol:'#00aaff'},
};
const SEQS=[
  ['TALL','LOW','FLOAT','TALL','LOW','TALL','FLOAT','LOW'],
  ['LOW','FLOAT','TALL','LOW','FLOAT','TALL','LOW','TALL'],
  ['FLOAT','TALL','LOW','TALL','FLOAT','LOW','TALL','FLOAT'],
];

/* ══════════════════════════════════════════
   PHASER SCENE
══════════════════════════════════════════ */
class Game extends Phaser.Scene{
  constructor(){super('G')}

  create(){
    sceneRef=this;

    // ── FULL RESET (fixes restart bug) ──
    score=0; lives=3; wave=1;
    this.over=false; this.inv=false;
    this.baseSpd=3.0; this.spawnGap=2400;
    this.duck=false; this.jumping=false;
    this.sparks=[]; this.runF=0;
    this.slowActive=false; this.phaseActive=false; this.nukeActive=false;
    this.seqIdx=0; this.seqSet=0;
    this.scoreTick=0;
    // Reset skill state
    Object.values(SK).forEach(s=>{s.active=false;s.cdLeft=0;s.t0=0;s.wasReady=true;});
    resetSkillDOM();
    stopBGM();
    hud();

    this._bg(); this._gnd(); this._starsInit(); this._mkPlayer();

    // ── Obstacle group — always fresh ──
    this.obs=this.add.group();

    // ── Timers — paused until _beginPlay ──
    this.tScore=this.time.addEvent({delay:80,loop:true,paused:true,
      callback:()=>{if(!this.over){score+=wave;this.scoreTick++;if(this.scoreTick%20===0)SFX.scoreUp();hud();}}
    });
    this.tSpawn=this.time.addEvent({delay:this.spawnGap,loop:true,paused:true,
      callback:this._spawn,callbackScope:this
    });
    this.tWave=this.time.addEvent({delay:12000,loop:true,paused:true,
      callback:this._waveUp,callbackScope:this
    });
    this.tRun=this.time.addEvent({delay:100,loop:true,
      callback:()=>{this.runF=(this.runF+1)%4;this._dp();}
    });

    /* Keyboard */
    this.input.keyboard.on('keydown-SPACE',()=>this._doJump());
    this.input.keyboard.on('keydown-UP',   ()=>this._doJump());
    this.input.keyboard.on('keydown-RIGHT',()=>this._doJump());
    this.input.keyboard.on('keydown-DOWN', ()=>this._doDuck());
    this.input.keyboard.on('keyup-DOWN',   ()=>this._noDuck());
    this.input.keyboard.on('keydown-LEFT', ()=>this._doDuck());
    this.input.keyboard.on('keyup-LEFT',   ()=>this._noDuck());
    this.input.keyboard.on('keydown-Q',    ()=>this._cast('q'));
    this.input.keyboard.on('keydown-W',    ()=>this._cast('w'));
    this.input.keyboard.on('keydown-E',    ()=>this._cast('e'));
    this.input.keyboard.on('keydown-R',    ()=>this._cast('r'));

    /* Touch */
    this._addTouch();

    /* SPACE to dismiss start screen */
    this.input.keyboard.once('keydown-SPACE',()=>{
      if(!gameStarted){let ss=EL('start-screen');if(ss)ss.remove();startGame();}
    });

    // If restarting (start screen already gone), begin immediately
    if(gameStarted){
      this._beginPlay();
      startBGM();
    }
  }

  _addTouch(){
    const safe=(id,fn)=>{let el=EL(id);if(!el)return;el.ontouchstart=ev=>{ev.preventDefault();fn();};};
    EL('tz-l').addEventListener('touchstart',ev=>{ev.preventDefault();this._doDuck();},{passive:false});
    EL('tz-l').addEventListener('touchend',  ev=>{ev.preventDefault();this._noDuck();},{passive:false});
    EL('tz-r').addEventListener('touchstart',ev=>{ev.preventDefault();this._doJump();},{passive:false});
    safe('tsk-q',()=>this._cast('q'));
    safe('tsk-w',()=>this._cast('w'));
    safe('tsk-e',()=>this._cast('e'));
    safe('tsk-r',()=>this._cast('r'));
  }

  _beginPlay(){
    this.tScore.paused=false;
    this.tSpawn.paused=false;
    this.tWave.paused=false;
  }

  /* ── BG / GROUND / STARS ── */
  _bg(){
    let g=this.add.graphics();
    for(let y=0;y<H;y+=3){let t=y/H;g.fillStyle(Phaser.Display.Color.GetColor(6+t*8|0,8+t*16|0,14+t*38|0),1);g.fillRect(0,y,W,3);}
    let gl=this.add.graphics();
    gl.fillGradientStyle(0x001428,0x001428,0x002244,0x002244,0,0,.6,.6);gl.fillRect(0,GY-30,W,78);
  }
  _gnd(){
    let g=this.add.graphics();
    g.lineStyle(2,0x00f5ff,.75);g.lineBetween(0,GY+36,W,GY+36);
    g.lineStyle(1,0x00f5ff,.2);g.lineBetween(0,GY+40,W,GY+40);
    for(let x=0;x<=W+50;x+=50){g.lineStyle(1,0x00f5ff,.06);g.lineBetween(x,GY+36,x-55,H-68);}
  }
  _starsInit(){
    this.stars=Array.from({length:65},()=>({x:Phaser.Math.Between(0,W),y:Phaser.Math.Between(0,GY-10),sz:Math.random()*1.5+.3,spd:Math.random()*.45+.07,ph:Math.random()*6.28}));
    this.sg=this.add.graphics();
  }

  /* ── PLAYER ── */
  _mkPlayer(){
    this.pg=this.add.graphics();this.pg.x=80;this.pg.y=GY;this.pY=GY;this._dp();
  }
  _dp(){
    let g=this.pg;g.clear();
    let d=this.duck,dh=d?20:38,dw=d?32:22,f=this.runF;
    let col=SK.q.active?0xffe135:(this.phaseActive?0xaa88ff:0x00f5ff);
    this.pg.alpha=this.phaseActive?.38:1;
    if(SK.q.active){g.lineStyle(3,0xffe135,.55);g.strokeCircle(0,-dh/2,dh/1.2);}
    if(this.phaseActive){g.lineStyle(2,0xaa88ff,.3);g.strokeCircle(0,-dh/2,(dh/1.2)+8);}
    g.fillStyle(col,.12);g.fillRoundedRect(-dw/2-5,-dh-5,dw+10,dh+10,7);
    g.fillStyle(col,1);g.fillRoundedRect(-dw/2,-dh,dw,dh,4);
    g.fillStyle(0x002233,1);g.fillRoundedRect(-dw/2+3,-dh+4,dw-6,dh-8,3);
    if(!d){
      g.fillStyle(col,1);g.fillRect(-7,-dh+6,14,6);g.fillStyle(0xffffff,.25);g.fillRect(-7,-dh+7,14,2);
      let lo=[0,6,0,-6][f];
      g.fillStyle(0x00ccdd,1);g.fillRect(-8,0,6,10+lo);g.fillRect(3,0,6,10-lo);
      g.fillStyle(col,1);g.fillRect(-10,8+lo,8,4);g.fillRect(1,8-lo,8,4);
      let as=[4,0,-4,0][f];
      g.fillStyle(0x00ccdd,1);g.fillRect(-dw/2-6,-dh+10+as,6,4);g.fillRect(dw/2,-dh+10-as,6,4);
    }
  }

  /* ── CONTROLS ── */
  _doJump(){
    if(this.over){return;}
    if(!gameStarted)return;
    if(this.jumping)return;
    if(this.duck)this._noDuck();
    this.jumping=true;
    SFX.jump();
    this.tweens.add({targets:this.pg,y:this.pY-92,duration:295,ease:'Quad.easeOut',yoyo:true,
      onComplete:()=>{this.jumping=false;this.pg.y=this.pY;SFX.land();}
    });
  }
  _doDuck(){
    if(this.over||!gameStarted||this.jumping)return;
    this.duck=true;this.pg.y=this.pY+14;this._dp();SFX.duck();
  }
  _noDuck(){
    if(!this.duck)return;
    this.duck=false;this.pg.y=this.pY;this._dp();
  }

  /* ── SPAWN ── */
  _spawn(){
    if(this.over)return;
    let seq=SEQS[this.seqSet%SEQS.length];
    let typeName=seq[this.seqIdx%seq.length];
    this.seqIdx++;
    if(this.seqIdx%seq.length===0)this.seqSet++;
    if(wave>=4&&Math.random()<.28)typeName='TALL';
    if(wave>=6&&Math.random()<.22)typeName='FLOAT';

    let type=OT[typeName];
    let i=Phaser.Math.Between(0,type.labels.length-1);
    let th=type.heights[i],tw=type.widths[i],ty=type.getY(th);

    let ob=this.add.graphics();
    ob.x=W+tw+8;ob.y=ty;ob.tw=tw;ob.th=th;ob.col=type.colors[i];
    ob.hint=type.hint;ob.hintCol=type.hintCol;
    ob.sp=this.baseSpd*(1+(wave-1)*0.12);
    ob.passed=false;
    this._drawOb(ob);

    ob.lb=this.add.text(ob.x,ty-th/2-4,type.labels[i],{
      fontFamily:"'Press Start 2P','Courier New',monospace",fontSize:'6px',
      color:'#'+type.colors[i].toString(16).padStart(6,'0'),stroke:'#000',strokeThickness:3
    }).setOrigin(.5,1).setDepth(5);
    ob.tg=this.add.text(ob.x,ty+th/2+4,type.hint,{
      fontFamily:"'Press Start 2P','Courier New',monospace",fontSize:'7px',
      color:type.hintCol,stroke:'#000',strokeThickness:3
    }).setOrigin(.5,0).setDepth(5);

    this.obs.add(ob);
  }
  _drawOb(ob){
    let{tw,th,col}=ob;ob.clear();
    ob.fillStyle(col,.1);ob.fillRoundedRect(-tw/2-6,-th/2-6,tw+12,th+12,8);
    ob.lineStyle(2,col,1);ob.strokeRoundedRect(-tw/2,-th/2,tw,th,4);
    ob.fillStyle(col,.18);ob.fillRoundedRect(-tw/2,-th/2,tw,th,4);
    ob.fillStyle(0xffffff,.04);for(let y=-th/2;y<th/2;y+=5)ob.fillRect(-tw/2,y,tw,2);
    ob.lineStyle(2,col,1);ob.beginPath();
    ob.moveTo(-tw/2,-th/2+8);ob.lineTo(-tw/2,-th/2);ob.lineTo(-tw/2+8,-th/2);
    ob.moveTo(tw/2-8,-th/2);ob.lineTo(tw/2,-th/2);ob.lineTo(tw/2,-th/2+8);
    ob.strokePath();
  }

  /* ── UPDATE ── */
  update(time,delta){
    if(this.over||!gameStarted)return;
    let now=time;

    // Skill tick
    Object.values(SK).forEach(sk=>{
      if(sk.active&&sk.dur>0&&now-sk.t0>=sk.dur){
        sk.active=false;
        if(sk.id==='w')this.slowActive=false;
        if(sk.id==='e')this.phaseActive=false;
        if(sk.id==='r')this.nukeActive=false;
        sk.cdLeft=sk.cd;
      }
      if(!sk.active&&sk.cdLeft>0)sk.cdLeft=Math.max(0,sk.cdLeft-delta);
      skUI(sk.id,now);
    });
    this._dp();

    // Stars
    let sm=this.slowActive?.3:1;
    this.sg.clear();
    this.stars.forEach(s=>{
      s.x-=s.spd*sm*(this.baseSpd/3);
      if(s.x<0){s.x=W;s.y=Phaser.Math.Between(0,GY-10);}
      let a=.16+Math.sin(now*.0014+s.ph)*.16;
      this.sg.fillStyle(0xffffff,a);this.sg.fillRect(s.x,s.y,s.sz,s.sz);
    });

    // Phase trail
    if(this.phaseActive&&Math.random()<.35)
      this._sp(this.pg.x+Phaser.Math.Between(-10,10),this.pg.y-20,0xaa88ff);

    // Obstacles
    let om=this.slowActive?.22:1;
    this.obs.getChildren().forEach(ob=>{
      ob.x-=ob.sp*om*(delta/16);
      ob.lb.x=ob.x;ob.tg.x=ob.x;

      if(!ob.passed&&ob.x<this.pg.x-40){ob.passed=true;SFX.pass();}

      if(this.nukeActive){
        for(let k=0;k<8;k++)this._sp(ob.x+Phaser.Math.Between(-30,30),ob.y+Phaser.Math.Between(-20,20),ob.col);
        ob.lb.destroy();ob.tg.destroy();ob.destroy();return;
      }

      if(!this.inv&&!SK.q.active&&!this.phaseActive){
        let px=this.pg.x,py=this.pg.y,pdh=this.duck?20:38,pdw=20;
        let pT=py-pdh,pB=py,pL=px-pdw/2,pR=px+pdw/2;
        let oL=ob.x-ob.tw/2,oR=ob.x+ob.tw/2,oT=ob.y-ob.th/2,oB=ob.y+ob.th/2;
        let mg=9;
        if(pR-mg>oL+mg&&pL+mg<oR-mg&&pB-mg>oT+mg&&pT+mg<oB-mg)this._hit(ob);
      }
      if(ob.x<-160){ob.lb.destroy();ob.tg.destroy();ob.destroy();}
    });

    if(Math.random()<.18)this._sp(this.pg.x-10,this.pg.y-20,SK.q.active?0xffe135:0x00f5ff);
    this._ticks(delta);
  }

  /* ── HIT ── */
  _hit(ob){
    lives--;this.inv=true;hud();SFX.hit();
    this.tweens.add({targets:this.pg,alpha:{from:1,to:.1},duration:65,yoyo:true,repeat:7,
      onComplete:()=>{this.pg.alpha=this.phaseActive?.38:1;this.inv=false;}
    });
    for(let i=0;i<24;i++)this._sp(ob.x,ob.y,ob.col);
    this.cameras.main.shake(200,.016);
    ob.lb.destroy();ob.tg.destroy();ob.destroy();
    if(lives<=0)this._over();
  }

  /* ── SKILLS ── */
  _cast(id){
    if(this.over||!gameStarted||!skRdy(id))return;
    let sk=SK[id];sk.active=true;sk.t0=this.time.now;
    let c=id==='q'?0xffe135:id==='w'?0x44ffcc:id==='e'?0xaa88ff:0xff2244;
    for(let i=0;i<35;i++)this._sp(this.pg.x+Phaser.Math.Between(-50,50),this.pg.y+Phaser.Math.Between(-70,20),c);

    if(id==='q'){SFX.skillQ();this._showFT('🛡 DOOT! SHIELD ON','#ffe135');this.cameras.main.flash(100,255,200,0);}
    if(id==='w'){SFX.skillW();this.slowActive=true;this._showFT('⏳ WAAAH SLOW TIME','#44ffcc');this.cameras.main.flash(100,0,200,180);}
    if(id==='e'){SFX.skillE();this.phaseActive=true;this._showFT('👻 WOOOO PHASE ON','#cc88ff');this.cameras.main.flash(100,120,60,220);}
    if(id==='r'){
      SFX.skillR();this.nukeActive=true;
      score+=600*wave;hud();
      this._showFT(`💥 AIRHORN! +${600*wave}`,'#ff4444',14);
      this.cameras.main.shake(300,.025);this.cameras.main.flash(200,255,80,0);
      this.time.delayedCall(sk.dur,()=>{sk.active=false;this.nukeActive=false;sk.cdLeft=sk.cd;});
    }
  }

  /* ── WAVE UP ── */
  _waveUp(){
    wave++;
    this.baseSpd=Math.min(10,3.0+(wave-1)*0.55+Math.pow(wave-1,1.3)*0.1);
    this.spawnGap=Math.max(700,2400-wave*180);
    this.tSpawn.delay=this.spawnGap;
    hud();setBGMTempo(wave);
    if(wave>=5){SFX.waveDanger();this.cameras.main.flash(200,255,100,0);this._showFT(`WAVE ${wave} ☠️ NGUY HIỂM!`,'#ff2244',14);}
    else{SFX.wave();this._showFT(`WAVE ${wave} 🔥`,'#ff9500',18);}
  }

  /* ── GAME OVER ── */
  _over(){
    this.over=true;
    if(score>best){best=score;}
    hud();
    [this.tScore,this.tSpawn,this.tWave,this.tRun].forEach(t=>{try{t.remove();}catch(e){}});
    this.obs.getChildren().forEach(o=>{try{o.sp=0;}catch(e){}});
    stopBGM();SFX.gameOver();
    try{TelegramGameProxy.shareScore();}catch(e){}

    let fl=this.add.graphics().setDepth(70);
    fl.fillStyle(0xff2244,.5);fl.fillRect(0,0,W,H);
    this.tweens.add({targets:fl,alpha:0,duration:400});

    this.time.delayedCall(400,()=>{
      let ov=this.add.graphics().setDepth(75);
      ov.fillStyle(0x000000,.9);ov.fillRoundedRect(W/2-165,H/2-100,330,200,10);
      ov.lineStyle(2,0xff2244,1);ov.strokeRoundedRect(W/2-165,H/2-100,330,200,10);
      let O={fontFamily:"'Press Start 2P','Courier New',monospace",stroke:'#000',strokeThickness:4};

      this.add.text(W/2,H/2-78,'😂 GAME OVER 😂',{...O,fontSize:'14px',color:'#ff2244'}).setOrigin(.5).setDepth(76);
      this.add.text(W/2,H/2-48,'Deadline đã đuổi kịp!',{fontFamily:"'Share Tech Mono','Courier New',monospace",fontSize:'11px',color:'rgba(255,255,255,0.7)'}).setOrigin(.5).setDepth(76);
      this.add.text(W/2,H/2-22,`SCORE: ${p6(score)}`,{...O,fontSize:'10px',color:'#00f5ff'}).setOrigin(.5).setDepth(76);
      this.add.text(W/2,H/2+2, `BEST:  ${p6(best)}`,{...O,fontSize:'10px',color:'#ffe135'}).setOrigin(.5).setDepth(76);
      this.add.text(W/2,H/2+24,`WAVE:  ${wave}`,{...O,fontSize:'9px',color:'#ff9500'}).setOrigin(.5).setDepth(76);

      let btn=this.add.text(W/2,H/2+62,'▶  RETRY 🔄',{...O,fontSize:'10px',color:'#fff'})
        .setOrigin(.5).setDepth(76).setInteractive({useHandCursor:true});
      btn.on('pointerdown',()=>{
        // ── KEY FIX: reset gameStarted so _beginPlay is called in create ──
        gameStarted=true;
        this.scene.restart();
      });
      btn.on('pointerover',()=>btn.setColor('#00f5ff'));
      btn.on('pointerout', ()=>btn.setColor('#fff'));
      this.tweens.add({targets:btn,alpha:{from:1,to:.3},duration:600,yoyo:true,repeat:-1});

      // SPACE to retry too
      this.input.keyboard.once('keydown-SPACE',()=>{
        gameStarted=true;this.scene.restart();
      });
    });
  }

  /* ── FLOAT TEXT ── */
  _showFT(txt,col,sz=12){
    let t=this.add.text(W/2,H/2-20,txt,{
      fontFamily:"'Press Start 2P','Courier New',monospace",
      fontSize:sz+'px',color:col,stroke:'#000',strokeThickness:5,align:'center'
    }).setOrigin(.5).setAlpha(0).setDepth(88);
    this.tweens.add({targets:t,alpha:{from:0,to:1},y:H/2-60,duration:200,hold:700,yoyo:true,onComplete:()=>t.destroy()});
  }

  /* ── SPARKS ── */
  _sp(x,y,col){
    let a=Math.random()*Math.PI*2,sp=Math.random()*4.5+1.5;
    this.sparks.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,ml:1,col});
  }
  _ticks(dt){
    if(!this.spG)this.spG=this.add.graphics().setDepth(60);
    this.spG.clear();
    this.sparks=this.sparks.filter(s=>s.life>0);
    this.sparks.forEach(s=>{
      s.x+=s.vx;s.y+=s.vy;s.vy+=.12;s.life-=dt/440;
      let a=Math.max(0,s.life/s.ml);
      this.spG.fillStyle(s.col,a);this.spG.fillRect(s.x-2,s.y-2,4,4);
    });
  }
}

/* Boot */
new Phaser.Game({
  type:Phaser.CANVAS,width:W,height:H,
  backgroundColor:'#05050e',parent:'gc',
  scene:[Game],scale:{mode:Phaser.Scale.NONE},
  input:{keyboard:true,touch:true,mouse:true},
  render:{antialias:false}
});
</script>
